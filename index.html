<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideyStream</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      position:relative;
      overflow:hidden;
    }

    .container{
      width:100%;
      max-width:520px;
      background:#181818;
      border-radius:20px;
      padding:25px;
      box-shadow:0 0 30px rgba(0,0,0,0.5);
      position:relative;
      z-index:2;
    }

    .logo{
      text-align:center;
      font-size:34px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .logo span{ color:#00bfff; }

    .subtitle{
      text-align:center;
      color:#aaa;
      margin-bottom:25px;
    }

    video{
      width:100%;
      border-radius:16px;
      background:black;
      margin-bottom:20px;
    }

    .link-box{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .link-box input{
      flex:1;
      background:#111;
      border:1px solid #333;
      color:white;
      padding:12px;
      border-radius:10px;
    }

    .copy-btn{
      background:#00bfff;
      border:none;
      color:black;
      padding:12px 18px;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .ad-box{
      background:#111;
      border:1px solid #333;
      border-radius:12px;
      padding:15px;
      text-align:center;
      color:#777;
      margin-top:10px;
    }

    .footer{
      text-align:center;
      color:#666;
      font-size:13px;
      margin-top:20px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    Videy<span>Stream</span>
  </div>

  <div class="subtitle">
    Watch & Share Video
  </div>

  <video controls autoplay>
    <source src="https://cdn2.videy.co/eNukFzWp1.mp4" type="video/mp4">
  </video>

  <div class="link-box">
    <input type="text" id="videoLink" value="https://cdn2.videy.co/eNukFzWp1.mp4" readonly>

    <button class="copy-btn" onclick="copyLink()">Copy</button>
  </div>

  <!-- 🔥 AD BOX (TETAP POSISI ASLI) -->
  <div class="ad-box">
    Ads Area
  </div>

  <div class="footer">
    © 2026 VideyStream
  </div>

</div>

<!-- 🔥 SMARTLINK (TETAP) -->
<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", function () {
    setTimeout(function () {
      window.open(
        "https://www.effectivecpmnetwork.com/rjhdatzae?key=74c1f0f8dc9635b2d5c5c6d94a2a2882",
        "_blank"
      );
    }, 8000);
  });
</script>

<!-- 🔥 POPUNDER DIGANTI KE ADSTERRA / ECN SCRIPT KAMU -->
<script src="https://pl28936974.effectivecpmnetwork.com/7d/e5/21/7de5216dc283a24e545f9b8a0cdb49a9.js"></script>

<script>
function copyLink() {
  var copyText = document.getElementById("videoLink");
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(copyText.value);
  alert("Link berhasil disalin");
}
</script>

</body>
</html>
