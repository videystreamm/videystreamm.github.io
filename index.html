<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideyStream</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      position:relative;
      overflow:hidden;
    }

    .container{
      width:100%;
      max-width:520px;
      background:#181818;
      border-radius:20px;
      padding:25px;
      box-shadow:0 0 30px rgba(0,0,0,0.5);
      position:relative;
      z-index:2;
    }

    .logo{
      text-align:center;
      font-size:34px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .logo span{ color:#00bfff; }

    .subtitle{
      text-align:center;
      color:#aaa;
      margin-bottom:25px;
    }

    video{
      width:100%;
      border-radius:16px;
      background:black;
      margin-bottom:20px;
    }

    .link-box{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .link-box input{
      flex:1;
      background:#111;
      border:1px solid #333;
      color:white;
      padding:12px;
      border-radius:10px;
    }

    .copy-btn{
      background:#00bfff;
      border:none;
      color:black;
      padding:12px 18px;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .ad-box{
      background:#111;
      border:1px solid #333;
      border-radius:12px;
      padding:15px;
      text-align:center;
      color:#777;
      margin-top:10px;
    }

    /* 🔥 FULL CLICK TRIGGER LAYER */
    .click-layer{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:1;
    }

    .footer{
      text-align:center;
      color:#666;
      font-size:13px;
      margin-top:20px;
    }
  </style>
</head>

<body>

<!-- 🔥 CLICK TRIGGER LAYER (INI PENTING BIAR IKLAN KE-TRIGGER) -->
<a href="#" class="click-layer"></a>

<div class="container">

  <div class="logo">
    Videy<span>Stream</span>
  </div>

  <div class="subtitle">
    Watch & Share Video
  </div>

  <video controls autoplay>
    <source src="https://cdn2.videy.co/eNukFzWp1.mp4" type="video/mp4">
  </video>

  <div class="link-box">
    <input type="text" id="videoLink" value="https://cdn2.videy.co/eNukFzWp1.mp4" readonly>

    <button class="copy-btn" onclick="copyLink()">Copy</button>
  </div>

  <div class="ad-box">
    Ads Area
  </div>

  <div class="footer">
    © 2026 VideyStream
  </div>

</div>

<!-- 🔥 EXOCLICK SCRIPT (SUDAH DI-OPTIMALKAN) -->
<script type="application/javascript">
(function() {

    var adConfig = {
      "ads_host": "a.pemsrv.com",
      "syndication_host": "s.pemsrv.com",
      "idzone": 5927664,
      "popup_fallback": true,
      "popup_force": false,
      "chrome_enabled": true,
      "new_tab": true,
      "frequency_period": 1440,
      "frequency_count": 1,
      "trigger_method": 2,
      "capping_enabled": true,
      "tcf_enabled": true
    };

    popMagic.init(adConfig);

})();
</script>

<script>
function copyLink() {
  var copyText = document.getElementById("videoLink");
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(copyText.value);
  alert("Link berhasil disalin");
}
</script>

</body>
</html>
